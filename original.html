<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BTC Signal AI v3</title>
<script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0e1117; --card:#161b27; --card2:#1c2333;
  --border:#252e42; --border2:#2d3a52;
  --long:#06b66b; --long-bg:rgba(6,182,107,0.1);
  --short:#f04452; --short-bg:rgba(240,68,82,0.1);
  --hold:#f5a623; --hold-bg:rgba(245,166,35,0.1);
  --blue:#3182f6; --blue-bg:rgba(49,130,246,0.1);
  --text:#e8edf5; --text2:#8b95a7; --text3:#556070;
  --r:10px; --r-sm:6px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;font-size:14px;line-height:1.5;}
.mono{font-family:'IBM Plex Mono',monospace;}

/* ── License Gate ── */
.lg{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999;}
.lg.hidden{display:none;}
.lg-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px 36px;width:100%;max-width:400px;text-align:center;}
.lg-logo{width:52px;height:52px;border-radius:12px;background:var(--long);display:grid;place-items:center;font-size:22px;font-weight:700;color:#fff;margin:0 auto 14px;}
.lg-badge{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:var(--long);background:var(--long-bg);border:1px solid rgba(6,182,107,.3);padding:3px 12px;border-radius:20px;margin-bottom:18px;}
.lg-dot{width:5px;height:5px;border-radius:50%;background:var(--long);animation:pulse 1.5s infinite;}
.lg-title{font-size:22px;font-weight:700;margin-bottom:6px;}
.lg-sub{font-size:13px;color:var(--text2);margin-bottom:28px;line-height:1.6;}
.lg-input{width:100%;padding:13px 16px;background:var(--bg);border:1px solid var(--border);border-radius:10px;font-size:14px;color:var(--text);margin-bottom:12px;font-family:'IBM Plex Mono',monospace;letter-spacing:1px;text-align:center;outline:none;}
.lg-input:focus{border-color:var(--long);}
.lg-input::placeholder{letter-spacing:0;color:var(--text3);font-family:'Noto Sans KR',sans-serif;}
.lg-btn{width:100%;padding:13px;background:var(--long);color:#fff;font-size:15px;font-weight:700;border:none;border-radius:10px;cursor:pointer;}
.lg-btn:hover{opacity:.88;}
.lg-error{font-size:12px;color:var(--short);margin-top:10px;min-height:18px;}
.lg-info{font-size:11px;color:var(--text3);margin-top:20px;line-height:1.7;}

/* ── Layout ── */
.wrap{max-width:1080px;margin:0 auto;padding:24px 20px;}
header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;padding-bottom:18px;border-bottom:1px solid var(--border);}
.hd-left{display:flex;align-items:center;gap:12px;}
.logo{width:36px;height:36px;border-radius:8px;background:var(--long);display:grid;place-items:center;font-size:16px;font-weight:700;color:#fff;}
.hd-title{font-size:18px;font-weight:700;}
.hd-sub{font-size:12px;color:var(--text2);margin-top:1px;}
.hd-badge{font-size:11px;font-weight:600;color:var(--long);background:var(--long-bg);border:1px solid rgba(6,182,107,.3);padding:3px 10px;border-radius:20px;}

/* ── Tabs ── */
.tabs{display:flex;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:4px;gap:0;margin-bottom:20px;}
.tab{flex:1;padding:9px 16px;border-radius:8px;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;transition:all .18s;text-align:center;border:none;background:none;}
.tab.active{background:var(--long);color:#fff;font-weight:600;}

/* ── Panels ── */
.panel{display:none;}
.panel.active{display:block;}

/* ── Controls ── */
.ctrl-row{display:flex;gap:8px;align-items:center;margin-bottom:16px;flex-wrap:wrap;}
.sym-select,.tf-select{padding:9px 14px;background:var(--card);border:1px solid var(--border);border-radius:var(--r-sm);font-size:13px;color:var(--text);cursor:pointer;outline:none;font-family:'Noto Sans KR',sans-serif;}
.sym-select:focus,.tf-select:focus{border-color:var(--long);}
.btn-refresh{padding:9px 20px;background:var(--long);color:#fff;border:none;border-radius:var(--r-sm);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;}
.btn-refresh:hover{opacity:.88;}
.btn-refresh:disabled{opacity:.4;cursor:not-allowed;}
.ws-status{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--text2);margin-left:auto;}
.ws-dot{width:6px;height:6px;border-radius:50%;background:var(--text3);}
.ws-dot.live{background:var(--long);animation:pulse 1.5s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ── Ticker ── */
.ticker-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
.ticker-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:12px 16px;min-width:130px;flex:1;}
.ticker-lbl{font-size:11px;font-weight:500;color:var(--text2);margin-bottom:4px;}
.ticker-val{font-size:18px;font-weight:700;font-family:'IBM Plex Mono',monospace;}
.ticker-val.pos{color:var(--long);}
.ticker-val.neg{color:var(--short);}
.ticker-val.neu{color:var(--text);}

/* ── Chart ── */
#chart-container{width:100%;height:400px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:16px;}

/* ── Signal Hero ── */
.sig-hero{border-radius:var(--r);padding:22px 26px;margin-bottom:10px;border:2px solid;}
.sig-hero-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;}
.sig-hero-bottom{display:flex;align-items:center;gap:20px;padding-top:16px;border-top:1px solid rgba(255,255,255,0.08);}
.sig-entry-lbl{font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px;}
.sig-entry-val{font-size:19px;font-weight:700;font-family:'IBM Plex Mono',monospace;}
.sig-entry-val.long{color:var(--long);}
.sig-entry-val.short{color:var(--short);}
.sig-entry-val.hold{color:var(--hold);}
.sig-conf-wrap{flex:1;}
.sig-conf-lbl{font-size:11px;color:var(--text3);margin-bottom:5px;display:flex;justify-content:space-between;align-items:center;}
.sig-conf-bar{height:6px;background:rgba(255,255,255,0.08);border-radius:4px;overflow:hidden;}
.sig-conf-fill{height:100%;border-radius:4px;transition:width 1s ease;}
.sig-conf-fill.long{background:var(--long);}
.sig-conf-fill.short{background:var(--short);}
.sig-conf-fill.hold{background:var(--hold);}
.sig-hero.long{background:var(--long-bg);border-color:rgba(6,182,107,.4);}
.sig-hero.short{background:var(--short-bg);border-color:rgba(240,68,82,.4);}
.sig-hero.hold{background:var(--hold-bg);border-color:rgba(245,166,35,.4);}
.sig-left{display:flex;align-items:center;gap:16px;}
.sig-badge{font-size:11px;font-weight:700;letter-spacing:1px;padding:3px 10px;border-radius:4px;margin-bottom:6px;display:inline-block;}
.sig-badge.long{background:var(--long);color:#fff;}
.sig-badge.short{background:var(--short);color:#fff;}
.sig-badge.hold{background:var(--hold);color:#fff;}
.sig-name{font-size:28px;font-weight:700;line-height:1;}
.sig-name.long{color:var(--long);}
.sig-name.short{color:var(--short);}
.sig-name.hold{color:var(--hold);}
.sig-reason{font-size:13px;color:var(--text2);margin-top:5px;max-width:500px;line-height:1.5;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sig-right{text-align:right;flex-shrink:0;}
.sig-lev-lbl{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:4px;}
.sig-lev-val{font-size:26px;font-weight:700;font-family:'IBM Plex Mono',monospace;color:var(--text);}

/* ── 3-col summary ── */
.sum-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px;}
.sum-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;}
.sum-lbl{font-size:11px;font-weight:500;color:var(--text2);margin-bottom:6px;}
.sum-val{font-size:20px;font-weight:700;font-family:'IBM Plex Mono',monospace;}
.sum-val.pos{color:var(--long);}
.sum-val.neg{color:var(--short);}
.sum-val.neu{color:var(--hold);}
.sum-sub{font-size:12px;color:var(--text2);margin-top:4px;}

/* ── Price Cards ── */
.price-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px;}
.price-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:18px;}
.price-tag{font-size:17px;font-weight:700;margin-bottom:8px;}
.price-tag.buy{color:var(--long);}
.price-tag.sell{color:var(--short);}
.price-tag.stop{color:var(--hold);}
.price-val{font-size:13px;font-weight:600;font-family:'IBM Plex Mono',monospace;color:var(--text);margin-bottom:4px;}
.price-note{font-size:12px;color:var(--text2);line-height:1.5;}

/* ── Indicators ── */
.sec-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin:16px 0 8px;}
.ind-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:10px;}
@media(max-width:640px){.ind-grid{grid-template-columns:repeat(2,1fr);}.sum-row,.price-row{grid-template-columns:1fr;}}
.ind-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;}
.ind-name{font-size:11px;font-weight:500;color:var(--text2);margin-bottom:6px;}
.ind-row{display:flex;align-items:center;gap:7px;}
.ind-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.ind-dot.bull{background:var(--long);}
.ind-dot.bear{background:var(--short);}
.ind-dot.neu{background:var(--hold);}
.ind-val{font-size:13px;font-weight:600;font-family:'IBM Plex Mono',monospace;}
.ind-val.bull{color:var(--long);}
.ind-val.bear{color:var(--short);}
.ind-val.neu{color:var(--hold);}
.ind-sub{font-size:10px;color:var(--text3);margin-top:3px;}

/* ── Analysis card ── */
.ana-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:18px 20px;margin-bottom:8px;}
.ana-head{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--border);}
.ana-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.ana-body{font-size:13px;color:var(--text2);line-height:1.8;}

/* ── RR block ── */
.rr-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px 18px;margin-bottom:10px;display:flex;align-items:center;gap:20px;}
.rr-item{text-align:center;}
.rr-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;}
.rr-val{font-size:16px;font-weight:700;font-family:'IBM Plex Mono',monospace;}

/* ── Disclaimer ── */
.disclaimer{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:12px 16px;font-size:11px;color:var(--text3);line-height:1.6;margin-top:8px;}

/* ── Loading ── */
.loading-state{text-align:center;padding:60px 20px;color:var(--text2);}
.spin{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--long);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px;}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

/* ── 체험판 블러 ── */
.trial-blur{filter:blur(7px);user-select:none;pointer-events:none;transition:filter .3s;}
.trial-lock{position:relative;}
.trial-lock-overlay{
  position:absolute;inset:0;z-index:10;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(13,17,26,0.6);border-radius:var(--r);gap:10px;
}
.trial-lock-icon{font-size:28px;}
.trial-lock-text{font-size:13px;font-weight:600;color:var(--text2);text-align:center;}
.trial-lock-btn{
  padding:9px 22px;background:var(--green);color:#fff;
  border:none;border-radius:8px;font-size:13px;font-weight:700;
  cursor:pointer;margin-top:4px;transition:opacity .2s;
}
.trial-lock-btn:hover{opacity:.88;}
.trial-banner{
  background:rgba(6,182,107,0.07);border:1px solid rgba(6,182,107,0.25);
  border-radius:var(--r);padding:12px 18px;margin-bottom:12px;
  display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;
}
.trial-banner-text{font-size:13px;color:var(--text2);}
.trial-banner-text span{color:var(--green);font-weight:600;}
.trial-banner-btn{
  padding:7px 18px;background:var(--green);color:#fff;
  border:none;border-radius:7px;font-size:12px;font-weight:700;
  cursor:pointer;white-space:nowrap;
}
</style>
</head>
<body>

<!-- License Gate -->
<div class="lg" id="licenseGate">
  <div class="lg-box">
    <div class="lg-logo">₿</div>
    <div class="lg-badge"><div class="lg-dot"></div> BTC Signal AI</div>
    <div class="lg-title">라이선스 키를 입력하세요</div>
    <div class="lg-sub">구매 후 발급된 키를 입력하면<br>바로 이용할 수 있습니다</div>
    <input class="lg-input" id="lgInput" placeholder="BTCAI-XXXX-XXXX-XX" maxlength="32" autocomplete="off">
    <button class="lg-btn" id="lgBtn" onclick="submitKey()">입력 확인</button>
    <div class="lg-error" id="lgError"></div>
    <div style="display:flex;align-items:center;gap:10px;margin:16px 0 4px;">
      <div style="flex:1;height:1px;background:var(--border);"></div>
      <span style="font-size:12px;color:var(--text3);">또는</span>
      <div style="flex:1;height:1px;background:var(--border);"></div>
    </div>
    <button class="lg-btn" style="background:transparent;border:1px solid var(--border);color:var(--text2);margin-top:0;" onclick="startTrial()">🔍 무료 체험해보기</button>
    <div class="lg-info">키는 한 번 입력하면 이 기기에 저장됩니다<br>문의: 구매처에 연락하세요</div>
  </div>
</div>

<div class="wrap">
  <header>
    <div class="hd-left">
      <div class="logo">₿</div>
      <div>
        <div class="hd-title">BTC Signal AI</div>
        <div class="hd-sub">실시간 기술적 분석 · 자동 매매 신호</div>
      </div>
    </div>
    <div class="hd-badge">v3.0</div>
  </header>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('signal')">📊 실시간 분석</div>
    <div class="tab" onclick="switchTab('chart')">📈 차트</div>
  </div>

  <!-- Signal Panel -->
  <div class="panel active" id="panel-signal">
    <div class="ctrl-row">
      <select class="sym-select" id="symSelect" onchange="onSymbolChange()">
        <option value="BTCUSDT">BTC/USDT</option>
        <option value="ETHUSDT">ETH/USDT</option>
        <option value="SOLUSDT">SOL/USDT</option>
        <option value="BNBUSDT">BNB/USDT</option>
      </select>
      <select class="tf-select" id="tfSelect" onchange="onTfChange()">
        <option value="1m">1분봉</option>
        <option value="5m">5분봉</option>
        <option value="15m" selected>15분봉</option>
        <option value="1h">1시간봉</option>
        <option value="4h">4시간봉</option>
        <option value="1d">1일봉</option>
      </select>
      <button class="btn-refresh" id="refreshBtn" onclick="runAnalysis()">🔄 분석 새로고침</button>
      <div class="ws-status"><div class="ws-dot" id="wsDot"></div><span id="wsLbl">연결 중...</span></div>
    </div>

    <div class="ticker-row">
      <div class="ticker-card"><div class="ticker-lbl">현재가</div><div class="ticker-val neu mono" id="tkPrice">—</div></div>
      <div class="ticker-card"><div class="ticker-lbl">24h 변동</div><div class="ticker-val" id="tkChange">—</div></div>
      <div class="ticker-card"><div class="ticker-lbl">24h 고가</div><div class="ticker-val pos mono" id="tkHigh">—</div></div>
      <div class="ticker-card"><div class="ticker-lbl">24h 저가</div><div class="ticker-val neg mono" id="tkLow">—</div></div>
      <div class="ticker-card"><div class="ticker-lbl">24h 거래량</div><div class="ticker-val neu" id="tkVol">—</div></div>
    </div>

    <div id="analysisArea">
      <div class="loading-state" id="loadingState">
        <div class="spin"></div>
        <div>데이터 불러오는 중...</div>
      </div>
    </div>
  </div>

  <!-- Chart Panel -->
  <div class="panel" id="panel-chart">
    <div class="ctrl-row">
      <select class="sym-select" id="chartSymSelect" onchange="onChartSymChange()">
        <option value="BTCUSDT">BTC/USDT</option>
        <option value="ETHUSDT">ETH/USDT</option>
        <option value="SOLUSDT">SOL/USDT</option>
        <option value="BNBUSDT">BNB/USDT</option>
      </select>
      <select class="tf-select" id="chartTfSelect" onchange="onChartTfChange()">
        <option value="1m">1분봉</option>
        <option value="5m">5분봉</option>
        <option value="15m" selected>15분봉</option>
        <option value="1h">1시간봉</option>
        <option value="4h">4시간봉</option>
        <option value="1d">1일봉</option>
      </select>
      <div class="ws-status"><div class="ws-dot" id="chartWsDot"></div><span id="chartWsLbl">—</span></div>
    </div>
    <div id="chart-container"></div>
  </div>
</div>

<script>
// ════════════════════════════════════════
// LICENSE
// ════════════════════════════════════════
const WP_API = 'https://wordpress-1588000-6280934.cloudwaysapps.com/wp-json/btcai/v1';

function getDeviceId() {
  let id = localStorage.getItem('btcai_device_id');
  if (!id) { id = 'dev-' + Math.random().toString(36).slice(2,12); localStorage.setItem('btcai_device_id', id); }
  return id;
}
window.resetLicense = () => { localStorage.removeItem('btcai_license_key'); location.reload(); };

function startTrial() {
  isTrial = true;
  document.getElementById('licenseGate').classList.add('hidden');
  init();
}

function showLicenseGate() {
  document.getElementById('licenseGate').classList.remove('hidden');
  document.getElementById('lgInput').focus();
}

function setLgErr(msg) { document.getElementById('lgError').textContent = msg || ''; }

async function submitKey() {
  const btn = document.getElementById('lgBtn');
  const key = document.getElementById('lgInput').value.trim().toUpperCase();
  if (!key) return setLgErr('라이선스 키를 입력하세요.');
  btn.disabled = true; btn.textContent = '확인 중...'; setLgErr('');
  try {
    const res = await fetch(WP_API + '/verify', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ key, device_id: getDeviceId() })
    });
    const data = JSON.parse(await res.text());
    if (!data.ok) return setLgErr(data.msg || '인증 실패');
    localStorage.setItem('btcai_license_key', key);
    isTrial = false;
    document.getElementById('licenseGate').classList.add('hidden');
    init();
  } catch(e) { setLgErr('서버 연결 실패: ' + e.message); }
  finally { btn.disabled = false; btn.textContent = '입력 확인'; }
}

document.getElementById('lgInput').addEventListener('input', function() {
  let v = this.value.replace(/-/g,'').toUpperCase();
  if (v.length>5)  v = v.slice(0,5) +'-'+v.slice(5);
  if (v.length>10) v = v.slice(0,10)+'-'+v.slice(10);
  if (v.length>15) v = v.slice(0,15)+'-'+v.slice(15);
  this.value = v.slice(0,19);
});
document.getElementById('lgInput').addEventListener('keydown', e => { if(e.key==='Enter') submitKey(); });

(async function autoAuth() {
  const saved = localStorage.getItem('btcai_license_key');
  if (!saved) return;
  try {
    const res = await fetch(WP_API + '/verify', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ key: saved, device_id: getDeviceId() })
    });
    const data = JSON.parse(await res.text());
    if (data.ok) { document.getElementById('licenseGate').classList.add('hidden'); init(); }
    else { localStorage.removeItem('btcai_license_key'); setLgErr(data.msg || '인증 만료'); }
  } catch(e) { document.getElementById('licenseGate').classList.add('hidden'); init(); }
})();

async function fetchKlines(sym, interval, limit=200) {
  const url = `https://api.binance.com/api/v3/klines?symbol=${sym}&interval=${interval}&limit=${limit}`;
  try {
    const r = await fetch(url);
    if (!r.ok) throw new Error('HTTP ' + r.status);

    if (!Array.isArray(raw)) throw new Error('잘못된 응답');

      t: d[0]/1000, o: +d[1], h: +d[2], l: +d[3], c: +d[4], v: +d[5]
    }));
  } catch(e) {
    throw new Error('바이낸스 데이터 로드 실패. 서버(https://)에서 접속해 주세요.');
  }
}

// ════════════════════════════════════════
// TECHNICAL INDICATORS
// ════════════════════════════════════════
function calcSMA(data, period) {
  const result = [];
  for (let i=0; i<data.length; i++) {
    if (i < period-1) { result.push(null); continue; }
    const sum = data.slice(i-period+1, i+1).reduce((a,b)=>a+b, 0);
    result.push(sum/period);
  }
  return result;
}

function calcEMA(data, period) {
  const k = 2/(period+1);
  const result = [];
  let ema = null;
  for (let i=0; i<data.length; i++) {
    if (ema === null) { ema = data[i]; result.push(ema); continue; }
    ema = data[i]*k + ema*(1-k);
    result.push(ema);
  }
  return result;
}

function calcRSI(closes, period=14) {
  const gains=[], losses=[];
  for (let i=1; i<closes.length; i++) {
    const diff = closes[i]-closes[i-1];
    gains.push(Math.max(diff,0));
    losses.push(Math.max(-diff,0));
  }
  const result = new Array(period).fill(null);
  let avgG = gains.slice(0,period).reduce((a,b)=>a+b)/period;
  let avgL = losses.slice(0,period).reduce((a,b)=>a+b)/period;
  result.push(100 - 100/(1+(avgG/(avgL||0.0001))));
  for (let i=period; i<gains.length; i++) {
    avgG = (avgG*(period-1)+gains[i])/period;
    avgL = (avgL*(period-1)+losses[i])/period;
    result.push(100 - 100/(1+(avgG/(avgL||0.0001))));
  }
  return result;
}

function calcMACD(closes, fast=12, slow=26, signal=9) {
  const emaFast = calcEMA(closes, fast);
  const emaSlow = calcEMA(closes, slow);
  const macdLine = emaFast.map((v,i)=> v!==null&&emaSlow[i]!==null ? v-emaSlow[i] : null);
  const validMacd = macdLine.filter(v=>v!==null);
  const signalLine = calcEMA(validMacd, signal);
  // 길이 맞추기
  const offset = macdLine.length - validMacd.length;
  const sigFull = new Array(offset).fill(null).concat(
    new Array(validMacd.length - signalLine.length).fill(null).concat(signalLine)
  );
  const histogram = macdLine.map((v,i)=>v!==null&&sigFull[i]!==null ? v-sigFull[i] : null);
  return { macdLine, signalLine: sigFull, histogram };
}

function calcBollinger(closes, period=20, mult=2) {
  const sma = calcSMA(closes, period);
  const upper=[], lower=[], bandwidth=[];
  for (let i=0; i<closes.length; i++) {
    if (sma[i]===null) { upper.push(null); lower.push(null); bandwidth.push(null); continue; }
    const slice = closes.slice(i-period+1, i+1);
    const std = Math.sqrt(slice.reduce((s,v)=>s+Math.pow(v-sma[i],2),0)/period);
    upper.push(sma[i]+mult*std);
    lower.push(sma[i]-mult*std);
    bandwidth.push(((sma[i]+mult*std)-(sma[i]-mult*std))/sma[i]*100);
  }
  return { mid:sma, upper, lower, bandwidth };
}

function calcStoch(klineData, k=14, d=3) {
  const result = [];
  for (let i=0; i<klineData.length; i++) {
    if (i < k-1) { result.push(null); continue; }
    const slice = klineData.slice(i-k+1, i+1);
    const high = Math.max(...slice.map(x=>x.h));
    const low  = Math.min(...slice.map(x=>x.l));
    const close = klineData[i].c;
    result.push(high===low ? 50 : (close-low)/(high-low)*100);
  }
  const dLine = calcSMA(result.filter(v=>v!==null), d);
  return { k: result, d: dLine };
}

function calcVolumeMA(volumes, period=20) {
  return calcSMA(volumes, period);
}

// ════════════════════════════════════════
// SIGNAL ENGINE
// ════════════════════════════════════════
function generateSignal(kdata) {
  const closes = kdata.map(k=>k.c);
  const volumes = kdata.map(k=>k.v);
  const n = closes.length;
  const last = n-1;

  const rsi = calcRSI(closes, 14);
  const macd = calcMACD(closes);
  const bb = calcBollinger(closes, 20, 2);
  const ma20 = calcSMA(closes, 20);
  const ma50 = calcSMA(closes, 50);
  const ma200 = calcSMA(closes, 200);
  const ema12 = calcEMA(closes, 12);
  const ema26 = calcEMA(closes, 26);
  const volMA = calcVolumeMA(volumes, 20);

  const price = closes[last];
  const rsiVal = rsi[last];
  const macdVal = macd.macdLine[last];
  const macdSig = macd.signalLine[last];
  const macdHist = macd.histogram[last];
  const macdHistPrev = macd.histogram[last-1];
  const bbUpper = bb.upper[last];
  const bbLower = bb.lower[last];
  const bbMid = bb.mid[last];
  const ma20Val = ma20[last];
  const ma50Val = ma50[last];
  const ma200Val = ma200[last];
  const ema12Val = ema12[last];
  const ema26Val = ema26[last];
  const volNow = volumes[last];
  const volMAVal = volMA[last];

  // 점수 기반 신호 (+: 매수, -: 매도)
  let score = 0;
  const reasons = [];
  const bearReasons = [];

  // RSI
  if (rsiVal < 30) { score += 2; reasons.push('RSI 과매도(' + rsiVal.toFixed(1) + ')'); }
  else if (rsiVal < 45) { score += 1; reasons.push('RSI 저점권(' + rsiVal.toFixed(1) + ')'); }
  else if (rsiVal > 70) { score -= 2; bearReasons.push('RSI 과매수(' + rsiVal.toFixed(1) + ')'); }
  else if (rsiVal > 60) { score -= 1; bearReasons.push('RSI 고점권(' + rsiVal.toFixed(1) + ')'); }

  // MACD
  if (macdVal !== null && macdSig !== null) {
    if (macdVal > macdSig && macdHistPrev < 0 && macdHist > 0) { score += 2; reasons.push('MACD 골든크로스'); }
    else if (macdVal > macdSig) { score += 1; reasons.push('MACD 강세'); }
    else if (macdVal < macdSig && macdHistPrev > 0 && macdHist < 0) { score -= 2; bearReasons.push('MACD 데드크로스'); }
    else if (macdVal < macdSig) { score -= 1; bearReasons.push('MACD 약세'); }
  }

  // Bollinger
  if (bbLower && price <= bbLower) { score += 2; reasons.push('볼린저 하단 이탈(반등 가능)'); }
  else if (bbUpper && price >= bbUpper) { score -= 2; bearReasons.push('볼린저 상단 이탈(조정 가능)'); }
  else if (bbMid && price > bbMid) { score += 1; reasons.push('볼린저 중심선 위'); }
  else if (bbMid && price < bbMid) { score -= 1; bearReasons.push('볼린저 중심선 아래'); }

  // 이동평균
  if (ma20Val && ma50Val) {
    if (price > ma20Val && price > ma50Val) { score += 1; reasons.push('MA20·MA50 상회'); }
    else if (price < ma20Val && price < ma50Val) { score -= 1; bearReasons.push('MA20·MA50 하회'); }
    if (ma20Val > ma50Val) { score += 1; reasons.push('MA20 > MA50 (상승추세)'); }
    else { score -= 1; bearReasons.push('MA20 < MA50 (하락추세)'); }
  }
  if (ma200Val) {
    if (price > ma200Val) { score += 1; reasons.push('장기 MA200 상회'); }
    else { score -= 1; bearReasons.push('장기 MA200 하회'); }
  }

  // 거래량
  if (volMAVal && volNow > volMAVal * 1.5) {
    if (score > 0) { score += 1; reasons.push('거래량 급증(추세 확인)'); }
    else { score -= 1; bearReasons.push('거래량 급증(하락 가속)'); }
  }

  // 포지션 결정
  let position, posName, confidence, leverageRec;
  const absScore = Math.abs(score);

  if (score >= 4) { position='LONG'; posName='롱 (LONG)'; confidence=Math.min(50+absScore*7, 92); leverageRec='3x ~ 5x'; }
  else if (score >= 2) { position='LONG'; posName='롱 (LONG)'; confidence=Math.min(50+absScore*5, 80); leverageRec='2x ~ 3x'; }
  else if (score <= -4) { position='SHORT'; posName='숏 (SHORT)'; confidence=Math.min(50+absScore*7, 92); leverageRec='3x ~ 5x'; }
  else if (score <= -2) { position='SHORT'; posName='숏 (SHORT)'; confidence=Math.min(50+absScore*5, 80); leverageRec='2x ~ 3x'; }
  else { position='HOLD'; posName='관망 (HOLD)'; confidence=50; leverageRec='0x'; }

  // 가격 계산
  const atr = calcATR(kdata, 14);
  const atrVal = atr[last] || price * 0.02;

  let entryPrice, targetPrice, stopLoss, rrRatio;
  if (position === 'LONG') {
    entryPrice = price;
    targetPrice = price + atrVal * 3;
    stopLoss = price - atrVal * 1.5;
    rrRatio = '1 : 2.0';
  } else if (position === 'SHORT') {
    entryPrice = price;
    targetPrice = price - atrVal * 3;
    stopLoss = price + atrVal * 1.5;
    rrRatio = '1 : 2.0';
  } else {
    entryPrice = price;
    targetPrice = null;
    stopLoss = null;
    rrRatio = '—';
  }

  const fmt = v => '$' + v.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});

  const mainReason = (position==='LONG' ? reasons : bearReasons).slice(0,3).join(' · ') || '지표 혼조';

  // 시간봉 전략
  const tfStratMap = { '1m':'스캘핑','5m':'단타','15m':'단타','1h':'스윙','4h':'스윙','1d':'포지션' };
  const holdMap = { '1m':'5~30분','5m':'30분~2시간','15m':'1~4시간','1h':'1~3일','4h':'3~7일','1d':'1~4주' };

  return {
    position, posName, confidence,
    leverageRec,
    entryPrice: fmt(entryPrice),
    targetPrice: targetPrice ? fmt(targetPrice) : '—',
    stopLoss: stopLoss ? fmt(stopLoss) : '—',
    rrRatio,
    mainReason,
    score,
    indicators: {
      rsi: { val: rsiVal?.toFixed(1), sentiment: rsiVal<30?'bull':rsiVal>70?'bear':'neu', sub: rsiVal<30?'과매도':rsiVal>70?'과매수':'중립' },
      macd: { val: macdVal?.toFixed(2), sentiment: macdVal>macdSig?'bull':'bear', sub: macdVal>macdSig?'강세':'약세' },
      bbPos: { val: bbMid ? ((price-bbMid)/(bbUpper-bbMid)*100).toFixed(0)+'%' : '—', sentiment: price<bbLower?'bull':price>bbUpper?'bear':'neu', sub: price<bbLower?'하단 이탈':price>bbUpper?'상단 이탈':'중간대' },
      ma: { val: ma20Val?fmt(ma20Val):'—', sentiment: price>ma20Val?'bull':'bear', sub: price>ma20Val?'상회':'하회' },
      macd200: { val: ma200Val?fmt(ma200Val):'—', sentiment: price>ma200Val?'bull':'bear', sub: price>ma200Val?'장기 상승':'장기 하락' },
      vol: { val: volMAVal?(volNow/volMAVal*100).toFixed(0)+'%':'—', sentiment: volNow>volMAVal*1.3?'bull':volNow<volMAVal*0.7?'bear':'neu', sub: volNow>volMAVal*1.3?'평균 이상':'평균 이하' },
      score: { val: (score>0?'+':'')+score, sentiment: score>0?'bull':score<0?'bear':'neu', sub: '종합 점수' },
      ema: { val: ema12Val?fmt(ema12Val):'—', sentiment: ema12Val>ema26Val?'bull':'bear', sub: ema12Val>ema26Val?'단기 상승':'단기 하락' },
    },
    tfStrategy: tfStratMap[tf] || '단타',
    holdingPeriod: holdMap[tf] || '—',
    analysis: buildAnalysis(position, reasons, bearReasons, rsiVal, macdVal, macdSig, price, bbLower, bbUpper, ma20Val, ma50Val),
    strategy: buildStrategy(position, fmt(entryPrice), targetPrice?fmt(targetPrice):'—', stopLoss?fmt(stopLoss):'—'),
    riskWarn: buildRisk(position, rsiVal, score),
  };
}

function calcATR(kdata, period=14) {
  const tr = kdata.map((k,i) => {
    if (i===0) return k.h-k.l;
    const prevC = kdata[i-1].c;
    return Math.max(k.h-k.l, Math.abs(k.h-prevC), Math.abs(k.l-prevC));
  });
  return calcSMA(tr, period);
}

function buildAnalysis(pos, bull, bear, rsi, macdV, macdS, price, bbL, bbU, ma20, ma50) {
  const bullStr = bull.slice(0,3).join(', ');
  const bearStr = bear.slice(0,3).join(', ');
  if (pos==='LONG') return `현재 ${bullStr} 신호가 감지되어 매수 우위 상황입니다. RSI ${rsi?.toFixed(1)}으로 ${rsi<30?'과매도권에서 반등 가능성이 높습니다':'상승 모멘텀이 유지되고 있습니다'}. MACD는 ${macdV>macdS?'시그널선 위에서 강세 흐름을 나타냅니다':'크로스 이후 상승 전환 신호입니다'}. ${bearStr?'단, '+bearStr+' 리스크도 존재하므로 손절 라인을 반드시 설정하세요.':'지표 종합 시 매수 진입이 유리한 구간입니다.'}`;
  if (pos==='SHORT') return `현재 ${bearStr} 신호가 감지되어 매도 우위 상황입니다. RSI ${rsi?.toFixed(1)}으로 ${rsi>70?'과매수권에서 조정 가능성이 높습니다':'하락 모멘텀이 강화되고 있습니다'}. MACD는 ${macdV<macdS?'시그널선 아래에서 약세 흐름입니다':'데드크로스 이후 하락 전환 신호입니다'}. ${bullStr?'단, '+bullStr+' 반등 신호도 있으니 손절 라인을 철저히 지키세요.':'지표 종합 시 숏 진입이 유리한 구간입니다.'}`;
  return `현재 매수·매도 신호가 혼재되어 명확한 방향성이 없는 상황입니다. 강세 신호: ${bullStr||'없음'}. 약세 신호: ${bearStr||'없음'}. 변동성이 낮고 방향이 불분명하므로 추가 캔들을 관찰 후 진입을 결정하는 것이 좋습니다.`;
}

function buildStrategy(pos, entry, target, stop) {
  if (pos==='LONG') return `${entry} 근처에서 분할 진입을 추천합니다. 목표가 ${target}에서 50% 익절 후 나머지는 추세 추종으로 유지하세요. 손절 ${stop} 이탈 시 즉시 청산하며 손실을 제한합니다.`;
  if (pos==='SHORT') return `${entry} 근처에서 숏 진입 시 목표가 ${target}까지 목표합니다. 손절은 ${stop} 돌파 시로 설정하고, 목표가 절반 도달 시 포지션 일부 청산으로 리스크를 줄이세요.`;
  return `현재는 관망을 권장합니다. 명확한 돌파 또는 이탈 캔들이 나올 때까지 포지션을 보유하지 말고 기다리세요. RSI 30 이하 또는 70 이상, MACD 크로스 발생 시 진입을 검토하세요.`;
}

function buildRisk(pos, rsi, score) {
  const risks = [];
  if (Math.abs(score)<4) risks.push('신호 강도가 약하여 변동성에 취약합니다');
  if (rsi>65 && pos==='LONG') risks.push('RSI 고점권으로 단기 조정 가능성 있음');
  if (rsi<35 && pos==='SHORT') risks.push('RSI 저점권으로 단기 반등 가능성 있음');
  risks.push('레버리지 사용 시 손절 라인을 반드시 지키세요');
  risks.push('본 신호는 참고용이며 실제 투자는 본인 판단으로 하세요');
  return risks.slice(0,3).join('. ') + '.';
}

      </div>

      </div>
      <div class="price-card">
        <div class="price-tag stop">손절 라인</div>
        <div class="price-val" style="${isTrial?'filter:blur(6px);user-select:none;letter-spacing:2px;':''}">
          ${isTrial ? '$00,000.00' : sig.stopLoss}
        </div>
        <div class="price-note">ATR 1.5배 기준 손절가</div>
      </div>
    </div>

    <!-- Summary (아래로 내림) -->
    <div class="sec-label">신호 요약</div>
    <div class="sum-row">
      <div class="sum-card">
        <div class="sum-lbl">매매 신호</div>
        <div class="sum-val ${sig.position==='LONG'?'pos':sig.position==='SHORT'?'neg':'neu'}" style="font-size:22px">
          ${sig.position==='LONG'?'매수':sig.position==='SHORT'?'매도':'홀딩'}
          <span style="font-size:14px;color:var(--text2);margin-left:6px">[${sig.confidence}%]</span>
        </div>
        <div class="sum-sub">종합 점수: ${sig.score>0?'+':''}${sig.score}</div>
      </div>
      <div class="sum-card">
        <div class="sum-lbl">RSI (14)</div>
        <div class="sum-val ${sig.indicators.rsi.sentiment==='bull'?'pos':sig.indicators.rsi.sentiment==='bear'?'neg':'neu'}">${sig.indicators.rsi.val}</div>
        <div class="sum-sub">${sig.indicators.rsi.sub}</div>
      </div>
      <div class="sum-card">
        <div class="sum-lbl">MACD</div>
        <div class="sum-val ${sig.indicators.macd.sentiment==='bull'?'pos':'neg'}">${sig.indicators.macd.val}</div>
        <div class="sum-sub">${sig.indicators.macd.sub}</div>
      </div>
    </div>

    <!-- Indicators -->
    <div class="sec-label">기술 지표</div>
    <div class="${isTrial?'trial-blur':''}" style="${isTrial?'border-radius:var(--r);overflow:hidden;':''}">
    <div class="ind-grid">
      ${Object.entries({
        'RSI 14': sig.indicators.rsi,
        'MACD': sig.indicators.macd,
        '볼린저 위치': sig.indicators.bbPos,
        'MA 20': sig.indicators.ma,
        'MA 200': sig.indicators.macd200,
        '거래량 비율': sig.indicators.vol,
        '종합 점수': sig.indicators.score,
        'EMA 12': sig.indicators.ema,
      }).map(([name, ind]) => `
        <div class="ind-card">
          <div class="ind-name">${name}</div>
          <div class="ind-row">
            <div class="ind-dot ${ind.sentiment}"></div>
            <div class="ind-val ${ind.sentiment}">${ind.val||'—'}</div>
          </div>
          <div class="ind-sub">${ind.sub||''}</div>
        </div>`).join('')}
    </div>
    </div>

    <!-- Analysis -->
    <div class="sec-label">AI 분석</div>
    <div class="${isTrial?'trial-blur':''}" style="${isTrial?'border-radius:var(--r);':''}" >
    <div class="ana-card">
      <div class="ana-head"><div class="ana-dot" style="background:var(--blue)"></div>종합 분석 근거</div>
      <div class="ana-body">${sig.analysis}</div>
    </div>
    <div class="ana-card">
      <div class="ana-head"><div class="ana-dot" style="background:var(--long)"></div>진입 전략</div>
      <div class="ana-body">${sig.strategy}</div>
    </div>
    <div class="ana-card">
      <div class="ana-head"><div class="ana-dot" style="background:var(--short)"></div>리스크 경고</div>
      <div class="ana-body">${sig.riskWarn}</div>
    </div>

    </div>
    ${isTrial ? '<div style="text-align:center;margin:10px 0 6px"><button class="trial-lock-btn" onclick="showLicenseGate()">🔒 구매하고 전체 분석 보기</button></div>' : ''}
    <div class="disclaimer">※ 본 분석은 기술적 지표 기반 자동 계산 결과이며, 실제 투자 판단의 근거로 사용할 수 없습니다. 암호화폐 투자에는 원금 손실 위험이 있으며 모든 투자 결정은 본인 책임입니다.</div>
  `;

  const trialBanner = isTrial ? `
    <div class="trial-banner">
      <div class="trial-banner-text">🔍 <span>무료 체험 중</span> — 진입가·목표가·손절가·상세 분석은 구매 후 확인 가능해요</div>
      <button class="trial-banner-btn" onclick="showLicenseGate()">지금 구매하기</button>
    </div>` : '';
  document.getElementById('analysisArea').innerHTML = trialBanner + html;
}

// ════════════════════════════════════════
// MAIN FLOW
// ════════════════════════════════════════
async function runAnalysis() {
  const btn = document.getElementById('refreshBtn');
  btn.disabled = true; btn.textContent = '분석 중...';
  document.getElementById('analysisArea').innerHTML = '<div class="loading-state"><div class="spin"></div><div>지표 계산 중...</div></div>';

  try {
    const [data, ticker] = await Promise.all([
      fetchKlines(symbol, tf, 300),
      fetchTicker(symbol)
    ]);
    klines = data;

    // 티커 업데이트
    const price = +ticker.lastPrice;
    const pct = +ticker.priceChangePercent;
    document.getElementById('tkPrice').textContent = '$' + price.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
    const chEl = document.getElementById('tkChange');
    chEl.textContent = (pct>=0?'+':'')+pct.toFixed(2)+'%';
    chEl.className = 'ticker-val mono '+(pct>=0?'pos':'neg');
    document.getElementById('tkHigh').textContent = '$' + (+ticker.highPrice).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
    document.getElementById('tkLow').textContent = '$' + (+ticker.lowPrice).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
    const vol = +ticker.quoteVolume;
    document.getElementById('tkVol').textContent = vol>1e9?(vol/1e9).toFixed(2)+'B':(vol/1e6).toFixed(0)+'M';

    const sig = generateSignal(data);
    renderAnalysis(sig, ticker);

  } catch(e) {
    const isLocal = location.protocol === 'file:';
    const msg = isLocal
      ? '⚠️ 로컬 파일에서는 바이낸스 API가 차단돼요.<br><br>👉 서버에 업로드 후 <b>https://</b> 주소로 접속하면 정상 작동해요!'
      : '❌ 데이터 로드 실패: ' + e.message;
    document.getElementById('analysisArea').innerHTML = `<div class="loading-state" style="color:var(--text2);line-height:2">${msg}</div>`;
  }
  btn.disabled = false; btn.textContent = '🔄 분석 새로고침';
}

function onSymbolChange() {
  symbol = document.getElementById('symSelect').value;
  connectTickerWS(symbol);
  runAnalysis();
}
function onTfChange() {
  tf = document.getElementById('tfSelect').value;
  runAnalysis();
}

// Auto refresh every 60 seconds
let autoTimer = null;
function startAutoRefresh() {
  if (autoTimer) clearInterval(autoTimer);
  autoTimer = setInterval(runAnalysis, 60000);
}

// ════════════════════════════════════════
// CHART
// ════════════════════════════════════════
let chart = null, candleSeries = null, chartWs = null;
let chartSymbol = 'BTCUSDT', chartTf = '15m';
let chartInited = false;

async function initChart() {
  // LightweightCharts 로드 확인
  if (typeof LightweightCharts === 'undefined') {
    document.getElementById('chartWsLbl').textContent = '라이브러리 로드 중...';
    await new Promise(r => setTimeout(r, 800));
    if (typeof LightweightCharts === 'undefined') {
      document.getElementById('chartWsLbl').textContent = '라이브러리 로드 실패 - 새로고침하세요';
      return;
    }
  }

  // 심볼/TF 신호탭과 동기화
  chartSymbol = symbol;
  chartTf = tf;
  const csEl = document.getElementById('chartSymSelect');
  const ctEl = document.getElementById('chartTfSelect');
  if (csEl) csEl.value = chartSymbol;
  if (ctEl) ctEl.value = chartTf;

  const container = document.getElementById('chart-container');
  if (!container) return;

  if (!chartInited) {
    chartInited = true;
    try {
      chart = LightweightCharts.createChart(container, {
        width: container.clientWidth,
        height: 440,
        layout: { background:{color:'#161b27'}, textColor:'#8b95a7' },
        grid: { vertLines:{color:'#252e42'}, horzLines:{color:'#252e42'} },
        crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
        rightPriceScale: { borderColor:'#252e42' },
        timeScale: { borderColor:'#252e42', timeVisible:true, secondsVisible:false },
        handleScroll: true,
        handleScale: true,
      });
      candleSeries = chart.addCandlestickSeries({
        upColor:'#06b66b', downColor:'#f04452',
        borderUpColor:'#06b66b', borderDownColor:'#f04452',
        wickUpColor:'#06b66b', wickDownColor:'#f04452',
      });
      window.addEventListener('resize', () => {
        if (chart) chart.applyOptions({ width: container.clientWidth });
      });
    } catch(e) {
      console.error('차트 생성 실패:', e);
      document.getElementById('chartWsLbl').textContent = '차트 생성 실패: ' + e.message;
      chartInited = false;
      return;
    }
  }

  await loadChartData();
  connectChartWS();
}

async function loadChartData() {
  if (!candleSeries) return;
  const lbl = document.getElementById('chartWsLbl');
  lbl.textContent = '데이터 로딩 중...';
  try {
    const url = `https://api.binance.com/api/v3/klines?symbol=${chartSymbol}&interval=${chartTf}&limit=500`;
    const res = await fetch(url);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const raw = await res.json();
    if (!Array.isArray(raw) || raw.length === 0) throw new Error('데이터 없음');
    const candles = raw.map(d => ({
      time: Math.floor(d[0] / 1000),
      open:  parseFloat(d[1]),
      high:  parseFloat(d[2]),
      low:   parseFloat(d[3]),
      close: parseFloat(d[4]),
    }));
    candleSeries.setData(candles);
    chart.timeScale().fitContent();
    lbl.textContent = `LIVE · ${chartSymbol} ${chartTf}`;
  } catch(e) {
    console.error('차트 데이터 로드 실패:', e);
    lbl.textContent = '로드 실패: ' + e.message;
  }
}

function connectChartWS() {
  if (chartWs) { chartWs.close(); chartWs = null; }

  const streamUrl = `wss://stream.binance.com:9443/ws/${chartSymbol.toLowerCase()}@kline_${chartTf}`;
  chartWs = new WebSocket(streamUrl);

  chartWs.onopen = () => {
    document.getElementById('chartWsDot').className = 'ws-dot live';
    document.getElementById('chartWsLbl').textContent = 'LIVE · ' + chartSymbol + ' ' + chartTf;
  };
  chartWs.onclose = () => {
    document.getElementById('chartWsDot').className = 'ws-dot';
    document.getElementById('chartWsLbl').textContent = '연결 끊김 (재시도 중...)';
    // 5초 후 자동 재연결
    setTimeout(() => {
      if (document.getElementById('panel-chart').classList.contains('active')) {
        connectChartWS();
      }
    }, 5000);
  };
  chartWs.onerror = () => {
    document.getElementById('chartWsLbl').textContent = '연결 오류';
  };
  chartWs.onmessage = e => {
    try {
      const msg = JSON.parse(e.data);
      const k = msg.k;
      if (!k || !candleSeries) return;
      const candle = {
        time:  Math.floor(parseInt(k.t) / 1000),
        open:  parseFloat(k.o),
        high:  parseFloat(k.h),
        low:   parseFloat(k.l),
        close: parseFloat(k.c),
      };
      candleSeries.update(candle);
    } catch(err) { console.error('WS 업데이트 오류:', err); }
  };
}

function onChartSymChange() {
  chartSymbol = document.getElementById('chartSymSelect').value;
  if (chartInited) { loadChartData(); connectChartWS(); }
}
function onChartTfChange() {
  chartTf = document.getElementById('chartTfSelect').value;
  if (chartInited) { loadChartData(); connectChartWS(); }
}

// ════════════════════════════════════════
// INIT
// ════════════════════════════════════════
function init() {
  connectTickerWS(symbol);
  runAnalysis();
  startAutoRefresh();
}
</script>
